<svg width="300" height="280" viewBox="0 0 300 280" xmlns="http://www.w3.org/2000/svg">
  <!-- Main egg shell bottom -->
  <path d="M80 160 C80 230 110 260 150 260 L150 260 C190 260 220 230 220 160 L210 150 L180 180 L150 150 L120 180 L90 150 Z" 
        fill="#fffff0" stroke="#d1d5db" stroke-width="3" stroke-linejoin="round"/>
  
  <!-- Top egg shell piece -->
  <path d="M70 140 C70 90 105 50 150 50 C195 50 230 90 230 140 L205 155 L175 130 L150 155 L125 130 L95 155 Z" 
        fill="#ffffff" stroke="#d1d5db" stroke-width="3" stroke-linejoin="round" 
        transform="rotate(-12, 150, 100)"/>
  
  <!-- Crack lines -->
  <path d="M90 150 L105 165 M210 150 L185 165 M150 155 L150 175" 
        stroke="#9ca3af" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Main crab body -->
  <ellipse cx="150" cy="170" rx="45" ry="35" fill="#ff6b35"/>
  
  <!-- Eyes -->
  <circle cx="135" cy="155" r="12" fill="white"/>
  <circle cx="135" cy="155" r="6" fill="#1f2937"/>
  <circle cx="135" cy="152" r="2" fill="white"/>
  
  <circle cx="165" cy="155" r="12" fill="white"/>
  <circle cx="165" cy="155" r="6" fill="#1f2937"/>
  <circle cx="165" cy="152" r="2" fill="white"/>
  
  <!-- Antennae -->
  <path d="M140 145 Q135 135 138 125" stroke="#ff6b35" stroke-width="2" stroke-linecap="round" fill="none"/>
  <path d="M160 145 Q165 135 162 125" stroke="#ff6b35" stroke-width="2" stroke-linecap="round" fill="none"/>
  <circle cx="138" cy="125" r="1.5" fill="#ff6b35"/>
  <circle cx="162" cy="125" r="1.5" fill="#ff6b35"/>
  
  <!-- Subtle smile -->
  <path d="M145 180 Q150 185 155 180" stroke="#d97544" stroke-width="2" stroke-linecap="round" fill="none"/>
  
  <!-- Left claw -->
  <ellipse cx="105" cy="175" rx="18" ry="25" fill="#e55a2b" transform="rotate(-25, 105, 175)"/>
  <path d="M95 165 Q85 160 90 150 L100 162 Z" fill="#e55a2b"/>
  <path d="M90 150 L95 145 L100 150 L95 155 Z" fill="#e55a2b"/>
  
  <!-- Right claw -->
  <ellipse cx="195" cy="175" rx="18" ry="25" fill="#e55a2b" transform="rotate(25, 195, 175)"/>
  <path d="M205 165 Q215 160 210 150 L200 162 Z" fill="#e55a2b"/>
  <path d="M210 150 L205 145 L200 150 L205 155 Z" fill="#e55a2b"/>
  
  <!-- Body segments -->
  <ellipse cx="150" cy="195" rx="35" ry="20" fill="#e55a2b" opacity="0.7"/>
  <ellipse cx="150" cy="210" rx="25" ry="15" fill="#e55a2b" opacity="0.5"/>
</svg>