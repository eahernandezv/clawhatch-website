  <!-- Simple eyes -->
  <circle cx="110" cy="120" r="8" fill="white"/>
  <circle cx="110" cy="120" r="4" fill="#000000"/>
  
  <circle cx="130" cy="120" r="8" fill="white"/>
  <circle cx="130" cy="120" r="4" fill="#000000"/>
  
  <!-- Bold claws -->
  <ellipse cx="85" cy="135" rx="12" ry="18" fill="#e55a2b" transform="rotate(-20, 85, 135)"/>
  <rect x="78" y="125" width="8" height="12" rx="4" fill="#e55a2b" transform="rotate(-20, 82, 131)"/>
  
  <ellipse cx="155" cy="135" rx="12" ry="18" fill="#e55a2b" transform="rotate(20, 155, 135)"/>
  <rect x="154" y="125" width="8" height="12" rx="4" fill="#e55a2b" transform="rotate(20, 158, 131)"/>
  
