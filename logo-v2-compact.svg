        fill="#ffffff" stroke="#9ca3af" stroke-width="4" stroke-linejoin="round"/>
  
  <!-- Top egg shell piece -->
  <path d="M50 100 C50 60 80 30 120 30 C160 30 190 60 190 100 L170 115 L140 90 L120 115 L100 90 L70 115 Z" 
        fill="#fffff0" stroke="#9ca3af" stroke-width="4" stroke-linejoin="round" 
